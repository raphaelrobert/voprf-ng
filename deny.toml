# Configuration for cargo-deny (https://embarkstudios.github.io/cargo-deny/).
# Run with `cargo deny check`.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# All dependencies use permissive licenses.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-1-Clause",
  "BSD-3-Clause",
  "MIT",
  "Unicode-3.0",
]

# r-efi is an UEFI-only transitive dependency of getrandom and is not linked on
# the platforms this crate targets.
[[licenses.exceptions]]
allow = ["LGPL-2.1-or-later"]
crate = "r-efi"

[bans]
# Two `rand_core` (0.6 + 0.9) and two `generic-array` (0.14 + 1) versions are
# expected: `elliptic-curve` 0.13 still pins the older releases. Tracked by
# TODO #150 (remove once `elliptic-curve` migrates).
multiple-versions = "warn"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
